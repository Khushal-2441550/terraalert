<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Disaster - TerraAlert</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header class="top-bar">
        <div class="logo-area" onclick="window.location.href='index.html'">
            <h2>TerraAlert</h2>
        </div>
        <div class="top-bar-right">
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle Dark Mode">
                <i class="fas fa-moon"></i>
            </button>
            <div class="user-profile" id="userProfile" onclick="toggleUserMenu()">
                <span id="navUsername">User</span>
                <img src="" id="navAvatar" alt="Profile">
            </div>
        </div>
    </header>

    <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <a href="index.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="report.html" class="active"><i class="fas fa-plus-circle"></i> Manage Reports</a>
            <a href="alerts.html"><i class="fas fa-exclamation-triangle"></i> View Alerts</a>
            <a href="realtime-map.html"><i class="fas fa-globe-asia"></i> Real-time Map</a>
        </div>
        <div class="sidebar-footer">
            <a href="#" onclick="logout()" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <section class="content" id="mainContent">
        <div class="main">
            <h1 class="page-title">Manage Disaster Reports</h1>
            <p class="subtitle">Submit new meteorological data or update existing entries.</p>

            <form id="reportForm" class="form-grid">
                <input type="hidden" id="reportId">
                <div class="form-group">
                    <label>State</label>
                    <select id="state" required>
                        <option value="">Select State</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>City</label>
                    <select id="city" required>
                        <option value="">Select City</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Pincode</label>
                    <input type="text" id="pincode" placeholder="6-digit Pincode" required>
                </div>
                <div class="form-group">
                    <label>Temperature (°C)</label>
                    <select id="temperature" required>
                        <option value="">Temperature</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Rainfall (mm)</label>
                    <select id="rainfall" required>
                        <option value="">Rainfall</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Wind Speed (km/h)</label>
                    <select id="windSpeed" required>
                        <option value="">Wind Speed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Humidity (%)</label>
                    <select id="humidity" required>
                        <option value="">Humidity</option>
                    </select>
                </div>
                <div class="form-group" style="justify-content: flex-end; display: flex;">
                    <button type="submit" id="submitBtn" class="btn-primary"
                        style="width: 100%; margin-top: auto;">Submit Report</button>
                </div>
            </form>

            <div id="responseMsg" style="margin: 20px 0; border-radius: 12px; transition: 0.3s;"></div>

            <h2 class="section-title">Historical Reports</h2>
            <div id="reportsList" class="card-container"></div>
        </div>
    </section>

    <style>
        .page-title {
            font-family: 'Playfair Display', serif;
            color: var(--accent-green);
            font-size: 36px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #546e7a;
            margin-bottom: 35px;
            font-size: 16px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            color: var(--earthy-brown);
            font-size: 28px;
            margin: 50px 0 20px 0;
        }
    </style>

    <script src="india-data.js"></script>
    <script src="script.js"></script>
    <script>
        if (!localStorage.getItem('token')) window.location.href = 'login.html';
        const user = JSON.parse(localStorage.getItem('user'));
        document.getElementById('navUsername').innerText = user.username;
        document.getElementById('navAvatar').src = `https://ui-avatars.com/api/?name=${user.username}&background=2e7d32&color=fff`;

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const mainContent = document.getElementById('mainContent');
        sidebarToggle.onclick = () => {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
        };
    </script>
    <script src="theme.js"></script>
</body>

</html>
