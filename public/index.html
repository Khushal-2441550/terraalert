<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TerraAlert</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <canvas id="bg"></canvas>

    <header class="top-bar">
        <div class="logo-area" onclick="window.location.href='index.html'">
            <h2>TerraAlert</h2>
        </div>
        <div class="top-bar-right">
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle Dark Mode">
                <i class="fas fa-moon"></i>
            </button>
            <div class="user-profile" id="userProfile" onclick="toggleUserMenu()">
                <span id="navUsername">User</span>
                <img src="" id="navAvatar" alt="Profile">
            </div>
        </div>
        <div id="userMenu" class="dropdown-menu">
            <p id="userEmail" class="menu-email"></p>
            <button onclick="logout()" class="btn-primary" style="padding: 10px; width: 100%;">Logout</button>
        </div>
    </header>

    <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <a href="index.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="report.html"><i class="fas fa-plus-circle"></i> Manage Reports</a>
            <a href="alerts.html"><i class="fas fa-exclamation-triangle"></i> View Alerts</a>
            <a href="realtime-map.html"><i class="fas fa-globe-asia"></i> Real-time Map</a>
        </div>
        <div class="sidebar-footer">
            <a href="#" onclick="logout()" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <section class="content" id="mainContent">
        <div class="main">
            <h1 class="page-title">Environmental Monitoring</h1>
            <p class="subtitle">Global hazards oversight and real-time analytical data.</p>

            <div class="card-container">
                <div class="card stat-card">
                    <h3><i class="fas fa-satellite"></i> Active Nodes</h3>
                    <p id="totalAlerts">Loading analytical feed...</p>
                </div>
                <div class="card stat-card">
                    <h3><i class="fas fa-heartbeat"></i> System Pulse</h3>
                    <p>India Segment: Nominal</p>
                </div>
            </div>

            <h2 class="section-title">Critical Hazard Feed</h2>
            <div id="alertContainer" class="card-container">
                <!-- Data populated via script.js -->
            </div>
        </div>
    </section>

    <style>
        .page-title {
            font-family: 'Playfair Display', serif;
            color: var(--accent-green);
            font-size: 42px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #546e7a;
            margin-bottom: 40px;
            font-size: 18px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            color: var(--earthy-brown);
            font-size: 30px;
            margin: 60px 0 25px 0;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 75px;
            right: 40px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            border: 1px solid #eee;
            z-index: 200;
            width: 220px;
        }

        .menu-email {
            margin: 0 0 20px;
            font-weight: 500;
            font-size: 14px;
            color: #78909c;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .stat-card h3 {
            color: var(--accent-green);
            font-size: 18px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .stat-card p {
            font-size: 24px;
            font-weight: 600;
            color: #263238;
            margin: 0;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="sphere.js"></script>
    <script src="script.js"></script>
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        const user = JSON.parse(localStorage.getItem('user'));
        if (user) {
            document.getElementById('navUsername').innerText = user.username.split(' ')[0];
            document.getElementById('userEmail').innerText = user.email;
            document.getElementById('navAvatar').src = `https://ui-avatars.com/api/?name=${user.username}&background=2e7d32&color=fff`;
        }

        function toggleUserMenu() {
            const menu = document.getElementById('userMenu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const mainContent = document.getElementById('mainContent');
        sidebarToggle.onclick = () => {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
        };
    </script>
    <script src="theme.js"></script>
</body>

</html>
