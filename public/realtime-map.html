<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Tracking - TerraAlert</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #realtime-map {
            height: 550px;
            width: 100%;
            border-radius: 32px;
            margin-top: 30px;
            z-index: 1;
            border: 3px solid var(--glass-border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1);
        }

        .weather-info {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 32px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.03);
        }

        .weather-item h3 {
            margin: 0;
            font-size: 13px;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.8;
        }

        .weather-item p {
            margin: 8px 0 0;
            font-size: 28px;
            font-weight: 600;
            color: #37474f;
        }

        .search-container {
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
        }

        .search-container input {
            flex-grow: 1;
            padding: 18px 25px;
            border-radius: 18px;
            border: 2px solid #eceff1;
            outline: none;
            background: white;
            font-size: 16px;
            transition: 0.3s;
        }

        .search-container input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 6px rgba(46, 125, 50, 0.08);
        }
    </style>
</head>

<body>
    <header class="top-bar">
        <div class="logo-area" onclick="window.location.href='index.html'">
            <h2>TerraAlert</h2>
        </div>
        <div class="top-bar-right">
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle Dark Mode">
                <i class="fas fa-moon"></i>
            </button>
            <div class="user-profile" id="userProfile" onclick="toggleUserMenu()">
                <span id="navUsername">User</span>
                <img src="" id="navAvatar" alt="Profile">
            </div>
        </div>
    </header>

    <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <a href="index.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="report.html"><i class="fas fa-plus-circle"></i> Manage Reports</a>
            <a href="alerts.html"><i class="fas fa-exclamation-triangle"></i> View Alerts</a>
            <a href="realtime-map.html" class="active"><i class="fas fa-globe-asia"></i> Real-time Map</a>
        </div>
        <div class="sidebar-footer">
            <a href="#" onclick="logout()" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>

    <section class="content" id="mainContent">
        <div class="main">
            <h1 class="page-title">Global Weather Tracking</h1>
            <p class="subtitle">Live meteorological telemetry and air quality analytics.</p>

            <div class="search-container">
                <input type="text" id="citySearch" placeholder="Enter city name (e.g., Delhi, London, Tokyo)...">
                <button onclick="getWeatherData()" class="btn-primary" style="margin-top:0;">Fetch Data</button>
            </div>

            <div class="weather-info" id="weatherDisplay" style="display: none;">
                <div class="weather-item">
                    <h3>Temp</h3>
                    <p id="temp">--°C</p>
                </div>
                <div class="weather-item">
                    <h3>AQI</h3>
                    <p id="aqi">--</p>
                </div>
                <div class="weather-item">
                    <h3>Condition</h3>
                    <p id="condition">--</p>
                </div>
                <div class="weather-item">
                    <h3>Wind</h3>
                    <p id="wind">-- km/h</p>
                </div>
            </div>

            <div id="realtime-map"></div>
        </div>
    </section>

    <style>
        .page-title {
            font-family: 'Playfair Display', serif;
            color: var(--accent-green);
            font-size: 40px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #546e7a;
            margin-bottom: 40px;
            font-size: 18px;
        }
    </style>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        if (!localStorage.getItem('token')) window.location.href = 'login.html';
        const user = JSON.parse(localStorage.getItem('user'));
        document.getElementById('navUsername').innerText = user.username.split(' ')[0];
        document.getElementById('navAvatar').src = `https://ui-avatars.com/api/?name=${user.username}&background=2e7d32&color=fff`;

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const mainContent = document.getElementById('mainContent');
        sidebarToggle.onclick = () => {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
        };

        let map = L.map('realtime-map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

        async function getWeatherData() {
            const city = document.getElementById('citySearch').value;
            if (!city) return;
            try {
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&format=json&limit=1`);
                const geoData = await geoRes.json();
                if (geoData && geoData.length > 0) {
                    const lat = geoData[0].lat; const lon = geoData[0].lon;
                    const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                    const weatherData = await weatherRes.json();
                    const aqiRes = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=european_aqi`);
                    const aqiData = await aqiRes.json();
                    const current = weatherData.current_weather;
                    const currentAqi = aqiData.current ? aqiData.current.european_aqi : 'N/A';
                    document.getElementById('weatherDisplay').style.display = 'flex';
                    document.getElementById('temp').innerText = `${current.temperature}°C`;
                    document.getElementById('aqi').innerText = currentAqi;
                    document.getElementById('condition').innerText = current.weathercode < 3 ? 'Clear' : (current.weathercode < 60 ? 'Cloudy' : 'Stormy');
                    document.getElementById('wind').innerText = `${current.windspeed} km/h`;
                    map.setView([lat, lon], 11);
                    L.marker([lat, lon]).addTo(map).bindPopup(`<b>${city}</b><br>Temp: ${current.temperature}°C<br>AQI: ${currentAqi}`).openPopup();
                }
            } catch (err) { console.error(err); }
        }
        document.getElementById('citySearch').value = 'Mumbai'; getWeatherData();
    </script>
    <script src="theme.js"></script>
</body>

</html>
